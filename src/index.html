<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS-Server — Glass Calculator</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div id="motherboard">
      <div id="inbound" class="zone">
        <h2>INBOUND</h2>
      </div>
      <div id="alu-lane" class="zone">
        <h2>ALU</h2>
        <div id="processor-core"></div>
      </div>
      <div id="db-write-queue" class="zone">
        <h2>DB WRITE QUEUE</h2>
      </div>
      <div id="outbound" class="zone">
        <h2>OUTBOUND</h2>
      </div>
      <div id="control-deck" class="zone">
        <h2>CONTROL DECK</h2>
        <div class="deck-inputs">
          <div class="input-group">
            <label for="input-a">VAL A</label>
            <input type="number" id="input-a" value="5" min="0" />
          </div>
          <div class="input-group">
            <label for="input-b">VAL B</label>
            <input type="number" id="input-b" value="10" min="0" />
          </div>
        </div>
        <button id="dispatch-btn">DISPATCH TRANSACTION</button>
        <div class="monitor-display">
          <label>MONITOR OUT:</label>
          <span id="monitor-result">READY</span>
        </div>
      </div>
      <div id="error-zone" class="zone">
        <h2>ERROR</h2>
      </div>
      <div id="log-panel" class="zone">
        <h2>TRACE LOG</h2>
        <div id="log-list"></div>
      </div>
      <div id="status-bar">
        <span>CSS-Server v0.1.0</span>
        <span id="status-port">:8080</span>
        <span id="status-counter">active: 0</span>
      </div>
    </div>
  </body>
</html>
